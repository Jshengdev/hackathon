code: hackathon-suite
name: "Hackathon Suite"
header: "Rapid ideation-to-execution for hackathon teams"
subheader: "Chaos in, winning project out. From context gathering to parallel development."
default_selected: false

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

project_name:
  prompt: "What is the name of your hackathon project?"
  default: "{directory_name}"
  result: "{value}"

team_size:
  prompt: "How many people on your team?"
  default: "4"
  result: "{value}"

default_duration:
  prompt: "Typical hackathon length (hours)?"
  default: "24"
  result: "{value}"

output_location:
  prompt: "Where should hackathon documents be generated?"
  default: "{output_folder}/hackathon-output"
  result: "{project-root}/{value}"

state_folder:
  prompt: "Where should project state be stored?"
  default: "{output_folder}/project-state"
  result: "{project-root}/{value}"

pitch_format:
  prompt: "Slide format preference?"
  default: "marp"
  result: "{value}"
  single-select:
    - value: "marp"
      label: "Marp - Markdown presentation"
    - value: "slidev"
      label: "Slidev - Developer slides"
    - value: "markdown"
      label: "Plain Markdown"

auto_devpost:
  prompt: "Auto-generate Devpost draft?"
  default: true
  result: "{value}"

session_ritual_style:
  prompt: "How should session transitions be handled?"
  default: "gentle"
  result: "{value}"
  single-select:
    - value: "invisible"
      label: "Invisible - Minimal interruption, auto-save"
    - value: "gentle"
      label: "Gentle - Brief confirmations"
    - value: "explicit"
      label: "Explicit - Detailed summaries"
